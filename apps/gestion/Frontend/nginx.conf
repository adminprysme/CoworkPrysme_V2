server {
  listen 3002;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self' __VITE_API_ORIGIN__ https://recherche-entreprises.api.gouv.fr https://api-adresse.data.gouv.fr; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
  add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

  location = /api/health {
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  location = /health {
    default_type application/json;
    return 200 '{"status":"ok"}';
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
